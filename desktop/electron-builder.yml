appId: ai.bitterbot.desktop
productName: Bitterbot
copyright: Copyright © 2026 Bitterbot
directories:
  output: release
  buildResources: resources

files:
  - dist-electron/**/*
  - dist-renderer/**/*
  - "!node_modules"
  - "!**/node_modules/.pnpm"

# Extra resources copied alongside the app (accessible via process.resourcesPath)
extraResources:
  - from: resources/demo-config.json
    to: resources/demo-config.json
  # API keys are hardcoded in main.ts for beta — no .env needed
  # P2P orchestrator binary (cross-compiled for Windows)
  - from: ../orchestrator/target/x86_64-pc-windows-gnu/release/bitterbot-orchestrator.exe
    to: bitterbot-orchestrator.exe

# No native modules needed for beta — node:sqlite is built into Node 22 (Electron 35)
# sharp, node-pty, napi-rs/canvas are optional and lazy-loaded with graceful fallbacks
electronVersion: "35.7.5"
executableName: Bitterbot
nodeGypRebuild: false
npmRebuild: false
buildDependenciesFromSource: false

# If native .node files end up in the bundle, they can't be loaded from asar
asarUnpack:
  - "**/*.node"
  - "**/node_modules/@sinclair/**"
  - "**/node_modules/@mariozechner/**"

icon: resources/icon.png

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false

win:
  target:
    - nsis
    - portable
  forceCodeSigning: false

linux:
  target:
    - AppImage
    - deb
    - rpm
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  include: resources/installer.nsh

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
